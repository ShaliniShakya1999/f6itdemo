<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08122b"/>
      <stop offset="0.55" stop-color="#0b3a86"/>
      <stop offset="1" stop-color="#061026"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="55%" r="60%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- network lines -->
  <g opacity="0.35" stroke="#ffffff" stroke-width="1.2">
    <path d="M980 140 1180 260 1460 180" />
    <path d="M930 360 1120 460 1480 420" />
    <path d="M980 660 1200 560 1480 690" />
    <path d="M860 240 980 140 930 360 860 240" />
    <path d="M1080 560 930 360 980 660 1080 560" />
  </g>
  <g opacity="0.9" fill="#9ae6ff">
    <circle cx="980" cy="140" r="4"/>
    <circle cx="1180" cy="260" r="4"/>
    <circle cx="1460" cy="180" r="4"/>
    <circle cx="930" cy="360" r="4"/>
    <circle cx="1120" cy="460" r="4"/>
    <circle cx="1480" cy="420" r="4"/>
    <circle cx="980" cy="660" r="4"/>
    <circle cx="1200" cy="560" r="4"/>
    <circle cx="1480" cy="690" r="4"/>
  </g>

  <!-- abstract "hand" glow (placeholder) -->
  <g transform="translate(980 210)" opacity="0.95">
    <ellipse cx="260" cy="280" rx="260" ry="260" fill="#0b1535" opacity="0.55" filter="url(#blur)"/>
    <path d="M120 420c70-40 140-70 220-85 80-15 150-14 220 10" fill="none" stroke="#9ae6ff" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round"/>
    <path d="M210 420c20-90 35-175 60-250 10-30 40-30 52 0 25 60 35 150 45 250" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- left vignette -->
  <rect width="920" height="900" fill="#000" opacity="0.22"/>
</svg>

