<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07122b"/>
      <stop offset="0.55" stop-color="#072a4f"/>
      <stop offset="1" stop-color="#040a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="55%" r="60%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="0.35" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- abstract hand + gear network -->
  <g transform="translate(900 120)">
    <ellipse cx="380" cy="360" rx="280" ry="280" fill="#0b1535" opacity="0.55" filter="url(#blur)"/>
    <circle cx="410" cy="320" r="110" fill="#0a1b3f" stroke="#9ae6ff" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="410" cy="320" r="62" fill="#07122b" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="3"/>

    <!-- gears -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round">
      <path d="M410 205v-25M410 460v-25M295 320h-25M545 320h-25"/>
    </g>
    <g fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="8">
      <circle cx="250" cy="250" r="55"/>
      <circle cx="590" cy="235" r="48"/>
      <circle cx="610" cy="420" r="58"/>
      <circle cx="260" cy="430" r="46"/>
    </g>

    <!-- connectors -->
    <g stroke="#fbbf24" stroke-opacity="0.55" stroke-width="2">
      <path d="M305 280 360 305" />
      <path d="M530 260 475 300" />
      <path d="M560 420 500 360" />
      <path d="M305 420 360 360" />
    </g>

    <!-- spark dots -->
    <g fill="#fbbf24" opacity="0.9">
      <circle cx="360" cy="305" r="3"/><circle cx="475" cy="300" r="3"/><circle cx="500" cy="360" r="3"/><circle cx="360" cy="360" r="3"/>
    </g>
  </g>

  <!-- left vignette for readable text -->
  <rect width="920" height="900" fill="#000" opacity="0.28"/>
</svg>

