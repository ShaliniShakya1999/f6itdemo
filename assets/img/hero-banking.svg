<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07122b"/>
      <stop offset="0.55" stop-color="#0a2a66"/>
      <stop offset="1" stop-color="#061026"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="35%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.16">
    <path d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600M0 840H1600" stroke="#ffffff"/>
    <path d="M120 0V900M240 0V900M360 0V900M480 0V900M600 0V900M720 0V900M840 0V900M960 0V900M1080 0V900M1200 0V900M1320 0V900M1440 0V900" stroke="#ffffff"/>
  </g>

  <!-- abstract "human + laptop" silhouette (placeholder) -->
  <g transform="translate(965 210)" opacity="0.9">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="#0b1535" opacity="0.65" filter="url(#blur)"/>
    <circle cx="280" cy="165" r="62" fill="#0c1a40" stroke="#9ae6ff" stroke-opacity="0.22" stroke-width="3"/>
    <path d="M210 310c40-55 140-55 180 0" fill="none" stroke="#9ae6ff" stroke-opacity="0.18" stroke-width="18" stroke-linecap="round"/>
    <rect x="160" y="340" width="270" height="150" rx="22" fill="#0a1840" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="3"/>
    <rect x="195" y="372" width="200" height="10" rx="5" fill="#3b82f6" opacity="0.55"/>
    <rect x="195" y="398" width="160" height="10" rx="5" fill="#22d3ee" opacity="0.45"/>
    <rect x="195" y="424" width="120" height="10" rx="5" fill="#a78bfa" opacity="0.35"/>
  </g>

  <!-- Hex tech overlay -->
  <g transform="translate(980 250)" opacity="0.92">
    <g fill="none" stroke="#9ae6ff" stroke-opacity="0.45" stroke-width="2">
      <path d="M250 40 335 90v95l-85 50-85-50V90l85-50Z"/>
      <path d="M390 160 460 200v80l-70 40-70-40v-80l70-40Z"/>
      <path d="M250 250 335 300v95l-85 50-85-50v-95l85-50Z"/>
      <path d="M120 160 190 200v80l-70 40-70-40v-80l70-40Z"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.88">
      <text x="218" y="152">BANKING</text>
      <text x="355" y="248">INSURANCE</text>
      <text x="206" y="362">EDUCATION</text>
      <text x="64" y="248">RETAIL</text>
    </g>
    <g fill="#22d3ee" opacity="0.9">
      <circle cx="250" cy="40" r="4"/>
      <circle cx="390" cy="160" r="4"/>
      <circle cx="250" cy="250" r="4"/>
      <circle cx="120" cy="160" r="4"/>
    </g>
  </g>
</svg>

