<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get In Touch — F6IT</title>
    <meta name="description" content="Get in touch with F6IT. Share your requirements for products and services." />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen antialiased bg-white">
    <div id="site-header"></div>

    <main>
      <!-- Hero: gradient + title + breadcrumb + illustration -->
      <section class="relative overflow-hidden bg-gradient-to-br from-[#E0F2FE] via-[#BAE6FD] to-[#7DD3FC]">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-12 lg:py-16">
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-8">
            <div class="flex-1" data-reveal>
              <h1 class="text-4xl font-bold tracking-tight text-[#0f172a] sm:text-5xl">Get In Touch</h1>
              <p class="mt-2 text-sm text-slate-600">
                <a href="index.html" class="hover:text-[#2563EB]">Home</a>
                <span class="mx-1">/</span>
                <span class="text-[#0f172a] font-medium">Get In Touch</span>
              </p>
            </div>
            <div class="hidden lg:block lg:w-80 xl:w-96 flex-shrink-0" data-reveal data-reveal-delay="100">
              <div class="rounded-2xl bg-white/40 p-6 text-center shadow-sm">
                <svg class="mx-auto h-32 w-32 text-[#2563EB]/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                </svg>
                <p class="mt-2 text-xs font-medium text-slate-600">Fintech & IT Solutions</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Form: Wish To Know More About Product/ Services -->
      <section class="bg-white py-12 lg:py-16">
        <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8">
          <h2 class="text-center text-2xl font-bold text-[#0f172a] sm:text-3xl">Wish To Know More About Product/ Services</h2>

          <form id="getInTouchForm" class="mt-10 space-y-8">
            <!-- Contact fields -->
            <div class="grid gap-6 sm:grid-cols-2">
              <label class="block">
                <span class="text-sm font-semibold text-[#0f172a]">Name <span class="text-red-500">*</span></span>
                <input type="text" name="name" required placeholder="Your name"
                  class="mt-1.5 block w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-[#0f172a] placeholder:text-slate-400 focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB]/20 focus:outline-none" />
              </label>
              <label class="block">
                <span class="text-sm font-semibold text-[#0f172a]">Email address <span class="text-red-500">*</span></span>
                <input type="email" name="email" required placeholder="you@example.com"
                  class="mt-1.5 block w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-[#0f172a] placeholder:text-slate-400 focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB]/20 focus:outline-none" />
              </label>
              <label class="block">
                <span class="text-sm font-semibold text-[#0f172a]">Mobile <span class="text-red-500">*</span></span>
                <input type="tel" name="mobile" required placeholder="+1 234 567 8900"
                  class="mt-1.5 block w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-[#0f172a] placeholder:text-slate-400 focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB]/20 focus:outline-none" />
              </label>
              <label class="block">
                <span class="text-sm font-semibold text-[#0f172a]">Country</span>
                <input type="text" name="country" placeholder="Your country"
                  class="mt-1.5 block w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-[#0f172a] placeholder:text-slate-400 focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB]/20 focus:outline-none" />
              </label>
            </div>

            <!-- Products -->
            <div>
              <h3 class="text-base font-bold text-[#0f172a] flex items-center gap-2">
                <span class="inline-block h-4 w-4 rounded bg-red-500/80" aria-hidden="true"></span>
                Products <span class="text-red-500">*</span>
              </h3>
              <div class="mt-4 grid grid-cols-2 gap-x-6 gap-y-2 sm:grid-cols-3 lg:grid-cols-4" id="productsList"></div>
            </div>

            <!-- Services -->
            <div>
              <h3 class="text-base font-bold text-[#0f172a] flex items-center gap-2">
                <span class="inline-block h-4 w-4 rounded bg-red-500/80" aria-hidden="true"></span>
                Services <span class="text-red-500">*</span>
              </h3>
              <div class="mt-4 grid grid-cols-2 gap-x-6 gap-y-2 sm:grid-cols-3 lg:grid-cols-4" id="servicesList"></div>
            </div>

            <!-- reCAPTCHA -->
            <div>
              <p class="text-sm font-semibold text-[#0f172a]">Are you human? <span class="text-red-500">*</span></p>
              <div class="mt-2 flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-6 text-sm text-slate-500">
                <span>reCAPTCHA placeholder — add your site key in production.</span>
              </div>
            </div>

            <!-- Submit -->
            <div class="pt-2">
              <button type="submit"
                class="w-full rounded-xl bg-[#22c55e] px-6 py-3.5 text-base font-semibold text-white shadow-sm transition hover:bg-[#16a34a] focus:outline-none focus:ring-2 focus:ring-[#22c55e]/50 focus:ring-offset-2 sm:w-auto sm:min-w-[180px]">
                SEND
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/getintouche.js"></script>
  </body>
</html>
